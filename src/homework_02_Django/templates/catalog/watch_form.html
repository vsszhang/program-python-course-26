{% extends "catalog/base.html" %} {% block content %}
<h2>Add New Watch</h2>

<form method="post">
  {% csrf_token %} {% if form.non_field_errors %}
  <div>{{ form.non_field_errors }}</div>
  {% endif %} {{ form.as_p }}

  <button type="submit">Save Watch</button>
</form>

<p>
  <a href="{% url 'catalog:watch_list' %}">Back to catalog</a>
</p>
{% endblock %}
