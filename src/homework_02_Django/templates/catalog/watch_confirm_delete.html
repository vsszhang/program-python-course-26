{% extends "catalog/base.html" %}

{% block content %}
<div class="delete-card">
  <h2>Delete Watch</h2>

  <p>
    Are you sure you want to delete
    <strong>{{ watch.name }}</strong>?
  </p>

  <form method="post">
    {% csrf_token %}
    <button class="danger-button" type="submit">Yes, delete</button>
    <a class="button-link" href="{% url 'catalog:watch_detail' watch.id %}">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
